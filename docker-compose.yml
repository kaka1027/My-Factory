version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/frontend.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/docker/backend.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=abd_cafe_db
      - DB_USER=KAKA
      - DB_PASSWORD=Taxikaka2772
      - JWT_SECRET=your-secret-key-here
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Taxikaka2772
      - MYSQL_DATABASE=abd_cafe_db
      - MYSQL_USER=KAKA
      - MYSQL_PASSWORD=Taxikaka2772
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pTaxikaka2772"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data: